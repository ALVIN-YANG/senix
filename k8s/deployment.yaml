apiVersion: apps/v1
kind: Deployment
metadata:
  name: senix
  labels:
    app: senix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: senix
  template:
    metadata:
      labels:
        app: senix
    spec:
      containers:
        - name: senix
          image: senix-gateway:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          env:
            - name: CONFIG_PATH
              value: "/opt/senix/configs/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /opt/senix/configs
      volumes:
        - name: config
          configMap:
            name: senix-config
