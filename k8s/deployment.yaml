apiVersion: apps/v1
kind: Deployment
metadata:
  name: senix
  labels:
    app: senix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: senix
  template:
    metadata:
      labels:
        app: senix
    spec:
      containers:
        - name: senix
          image: senix-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: CONFIG_PATH
              value: "/opt/senix/configs/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /opt/senix/configs
      volumes:
        - name: config
          configMap:
            name: senix-config
