name: React Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'web/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'web/package.json'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build